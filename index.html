<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarika Arthamwar | Program Director</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  body { font-family: 'DM Sans', sans-serif; background:#0D1117; color:#E6EDF3; margin:0; }
  .contact-form { display:flex; flex-direction:column; gap:12px; max-width:400px; }
  input, textarea { padding:10px; border-radius:6px; border:1px solid #333; background:#161B22; color:#fff; }
  button { background:#0F7B6C; color:#fff; border:none; padding:12px; border-radius:6px; cursor:pointer; }
  button:hover { background:#1AA38C; }
  footer { text-align:center; padding:20px; color:#8B949E; }
</style>
</head>

<body>

<h2 style="text-align:center;margin-top:40px;">Contact Me</h2>

<div style="display:flex;justify-content:center;margin-top:30px;">
  <div class="contact-form">

    <!-- Hidden spam trap -->
    <input type="text" id="company" style="display:none">

    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="message" placeholder="Your Message"></textarea>

    <button onclick="sendEmail()">Send Message</button>
    <p id="status"></p>

  </div>
</div>

<footer>
  <p>© 2026 Sarika Arthamwar · Program Director · Pune, India</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("Rk3tl5yA0sQFs5bBy");
})();

let lastSubmitted = 0;

function validateForm(name, email, message) {
  name = name.trim();
  email = email.trim();
  message = message.trim();

  if (!name || !email || !message) {
    alert("All fields are required");
    return false;
  }

  const specialChars = message.replace(/[a-zA-Z0-9\s]/g, "");
  if (specialChars.length > message.length * 0.4) {
    alert("Message looks suspicious");
    return false;
  }

  if (!/[a-zA-Z]/.test(message)) {
    alert("Message should contain valid text");
    return false;
  }

  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
  if (!email.match(emailPattern)) {
    alert("Enter valid email");
    return false;
  }

  if (message.length < 10) {
    alert("Message too short");
    return false;
  }

  return true;
}

function canSubmit() {
  const now = Date.now();
  if (now - lastSubmitted < 30000) {
    alert("Please wait 30 seconds before sending again");
    return false;
  }
  lastSubmitted = now;
  return true;
}

function sendEmail() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  if (document.getElementById("company").value !== "") return;

  if (!validateForm(name, email, message)) return;
  if (!canSubmit()) return;

  emailjs.send("service_4zyhc0i", "template_3rrkzco"), {
    name: name,
    email: email,
    message: message
  })
  .then(function() {
    document.getElementById("status").innerText = "Message sent successfully!";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("message").value = "";
  }, function(error) {
    document.getElementById("status").innerText = "Failed to send message";
  });
}
</script>

</body>
</html>
